navflex_nav:
  ros__parameters:
    use_sim_time: true
    navigation_type: rogmap
    tf_timeout: 0.5
    global_frame: map
    robot_frame: base_link
    odom_topic: odom

rog_map:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    point_cloud_topic: /scan_cloud
    transform_tolerance: 0.3
    publish_frequency: 1.0
    global_resolution: 0.4
    global_min: [-50.0, -50.0, -5.0]
    global_max: [50.0, 50.0, 15.0]
    local_resolution: 0.1
    local_size_x: 12.0
    local_size_y: 12.0
    local_size_z: 6.0
    ray_min_range: 0.3
    ray_max_range: 15.0
    esdf_max_distance: 5.0
    inflation_resolution: 0.1
    inflation_step: 3
    unknown_inflation: true
    unknown_inflation_step: 1
    unknown_threshold: 0.7
    point_filter_num: 1
    batch_update_size: 1
    virtual_ground_height: -5.0
    virtual_ceiling_height: 15.0

navflex_planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: [RogAStar]
    planner_frequency: 0.0
    planner_patience: 5.0
    planner_max_retries: 3
    RogAStar:
      plugin: navflex_rogmap_planner/RogAStarPlanner
      map_voxel_num: [120, 120, 60]
      allow_diagonal: true
      heuristic_type: 2
      use_inflated_map: true
      unknown_as_obstacle: false
      max_planning_time: 2.0
      footprint_type: sphere
      footprint_offset: [0.0, 0.0, 0.0]
      footprint_radius: 0.35
      footprint_height: 0.7
      footprint_size: [0.7, 0.5, 0.4]
      front_sphere_offset: [0.25, 0.0, 0.0]
      front_sphere_radius: 0.3
      rear_sphere_offset: [-0.25, 0.0, 0.0]
      rear_sphere_radius: 0.3
      footprint_safety_margin: 0.0

navflex_controller_server:
  ros__parameters:
    use_sim_time: true
    controller_plugins: [ScanController]
    controller_frequency: 20.0
    controller_patience: 5.0
    controller_max_retries: 3
    controller_required_consecutive_valid_cmds: 3
    default_xy_goal_tolerance: 0.2
    default_yaw_goal_tolerance: 0.2
    cmd_vel_topic: cmd_vel
    speed_limit_topic: speed_limit
    ScanController:
      plugin: scan_planner/ScanController
      footprint_type: sphere
      footprint_offset: [0.0, 0.0, 0.0]
      footprint_radius: 0.35
      footprint_height: 0.7
      footprint_size: [0.7, 0.5, 0.4]
      front_sphere_offset: [0.25, 0.0, 0.0]
      front_sphere_radius: 0.3
      rear_sphere_offset: [-0.25, 0.0, 0.0]
      rear_sphere_radius: 0.3
      footprint_safety_margin: 0.0
      planning_horizon: 5.0
      sample_distance: 0.1
      lookahead_time: 0.8
      control_lookahead_time: 0.15
      max_velocity: 0.8
      max_vertical_velocity: 0.4
      max_acceleration: 1.5
      max_yaw_rate: 1.0
      kp_position: 1.5
      kp_yaw: 2.0

navflex_behavior_server:
  ros__parameters:
    use_sim_time: true
