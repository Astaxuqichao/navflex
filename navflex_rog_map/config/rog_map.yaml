rog_map:
  ros__parameters:
    global_frame: map
    point_cloud_topic: /scan_cloud
    global_resolution: 0.4
    global_min: [-50.0, -50.0, -5.0]
    global_max: [50.0, 50.0, 15.0]
    local_resolution: 0.1
    local_size_x: 12.0
    local_size_y: 12.0
    local_size_z: 6.0
    ray_min_range: 0.3
    ray_max_range: 15.0
    esdf_max_distance: 5.0
    inflation_resolution: 0.2
    inflation_step: 2
    unknown_inflation: true
    unknown_inflation_step: 1
    unknown_threshold: 0.7
    point_filter_num: 2
    batch_update_size: 1
    virtual_ground_height: -5.0
    virtual_ceiling_height: 15.0
